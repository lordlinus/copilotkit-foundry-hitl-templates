name: Deploy showcase to Pages

# Publishes the static showcase gallery (showcase/ui) to GitHub Pages and stamps
# the always-on gateway URL from the `API_BASE` repository variable. Scoped to
# showcase/** so it never runs on template changes.

on:
  push:
    branches: [ main ]
    paths:
      - 'showcase/ui/**'
      - '.github/workflows/showcase-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: showcase-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    defaults:
      run:
        working-directory: showcase/ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Stamp gateway URL into dist/config.js
        env:
          API_BASE: ${{ vars.API_BASE }}
        run: |
          if [ -z "$API_BASE" ]; then
            echo "::warning::Repo variable API_BASE is empty — the UI will fall back to http://localhost:8080 and won't reach the gateway from Pages. Set it under Settings → Secrets and variables → Actions → Variables to your Container App URL."
          fi
          cat > dist/config.js <<EOF
          // Generated by .github/workflows/showcase-pages.yml — do not edit by hand.
          window.SHOWCASE_API_BASE = "${API_BASE}";
          EOF
          echo "Stamped SHOWCASE_API_BASE=${API_BASE}"

      - uses: actions/configure-pages@v5
        with:
          # Auto-create the Pages site on first run (repo Pages was never enabled).
          # Requires a plan that supports Pages on private repos (Pro/Team/Enterprise).
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: showcase/ui/dist

      - id: deploy
        uses: actions/deploy-pages@v4
