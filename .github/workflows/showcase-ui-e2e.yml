name: Showcase UI verification

# Tier-1 (jsdom DOM tests) + Tier-2 (Playwright browser E2E) gate for the showcase
# UI. Tier-1 is hermetic and runs on every change. Tier-2 starts the REAL gateway
# (hosted-agent runtime + bridge — there is no mock) and drives the built UI in
# Chromium, uploading screenshots. Tier-2 needs Azure (OIDC + a Foundry project), so
# it runs only when the Foundry vars/secrets are configured; otherwise it is skipped.

on:
  push:
    branches: [ main ]
    paths:
      - 'showcase/ui/**'
      - 'showcase/gateway/**'
      - 'showcase/agents.json'
      - 'templates/*/src/**'
      - 'templates/*/backend/**'
      - '.github/workflows/showcase-ui-e2e.yml'
  pull_request:
    paths:
      - 'showcase/ui/**'
      - 'showcase/gateway/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  dom-tests:
    name: Tier-1 · jsdom DOM tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: showcase/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run test:dom

  e2e:
    name: Tier-2 · Playwright (browser)
    runs-on: ubuntu-latest
    needs: dom-tests
    # Needs Azure (the real gateway runs the Foundry hosted-agent runtime). Skips
    # cleanly when the Foundry project isn't configured as a repo variable.
    if: ${{ vars.FOUNDRY_PROJECT_ENDPOINT != '' }}
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      FOUNDRY_PROJECT_ENDPOINT: ${{ vars.FOUNDRY_PROJECT_ENDPOINT }}
      AZURE_AI_MODEL_DEPLOYMENT_NAME: ${{ vars.AZURE_AI_MODEL_DEPLOYMENT_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Azure login (OIDC — keyless to the Foundry model)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Gateway = the REAL hosted-agent runtime + bridge per agent (no mock).
      - name: Set up gateway
        working-directory: showcase/gateway
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv/bin/python --prerelease=allow -r requirements.txt
      - name: Start gateway
        working-directory: showcase/gateway
        run: |
          PORT=8080 .venv/bin/python launcher.py > /tmp/gateway.log 2>&1 &
          for i in $(seq 1 90); do curl -sf http://localhost:8080/healthz && break; sleep 2; done

      # UI — build + preview, then E2E in Chromium against the mock gateway.
      - name: Build UI
        working-directory: showcase/ui
        env:
          VITE_API_BASE: http://localhost:8080
        run: |
          npm ci
          npm run build
      - name: Install Playwright Chromium
        working-directory: showcase/ui
        run: npx playwright install --with-deps chromium
      - name: Start preview
        working-directory: showcase/ui
        run: |
          npm run preview -- --port 4173 > /tmp/preview.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:4173/ && break; sleep 1; done
      - name: Run E2E
        working-directory: showcase/ui
        env:
          BASE_URL: http://localhost:4173
        run: npm run test:e2e
      - name: Upload screenshots + report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: showcase-e2e-artifacts
          path: |
            showcase/ui/screenshots/
            showcase/ui/playwright-report/
          if-no-files-found: ignore
