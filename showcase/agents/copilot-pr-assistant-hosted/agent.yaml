# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
kind: hosted
name: copilot-pr-assistant-hosted
protocols:
  - protocol: responses
    version: 2.0.0
resources:
  cpu: "1"
  memory: 2Gi
# Direct code deploy (no Docker/ACR): Foundry remote-builds the runtime from this
# source. The github-copilot-sdk wheel is py3-none-<platform>, so it resolves on
# the python_3_13 remote runtime. Container deploy is the fallback (see Dockerfile).
code_configuration:
  runtime: python_3_13
  entry_point: app.py
  dependency_resolution: remote_build
# Inference is through the GitHub Copilot SDK against an APIM/BYOM gateway.
# APIM_KEY is a secret — wire it from Key Vault for production; here it comes from
# the azd environment. Only gpt-5 / o-series models work with the Copilot SDK.
environment_variables:
  - name: APIM_GATEWAY
    value: ${APIM_GATEWAY}
  - name: APIM_PATH_PREFIX
    value: ${APIM_PATH_PREFIX}
  - name: APIM_KEY
    value: ${APIM_KEY}
  - name: MODEL_NAME
    value: ${MODEL_NAME=gpt-5.4-mini}
  - name: COPILOT_HOME
    value: /tmp/.copilot-home
