# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: conversational-banking
services:
    conversational-banking:
        project: .
        host: azure.ai.agent
        language: docker
        docker:
            path: hosted/responses/Dockerfile
            context: .
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            startupCommand: python app.py
