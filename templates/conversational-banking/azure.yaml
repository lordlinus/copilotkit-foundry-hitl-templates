# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
#
# LOCAL-DEV azd project, used only by `azd ai agent run` (see run-local.sh /
# scripts/lib-agentrun.sh — invoked from this directory so src/ resolves). It is
# NOT deployed; `hosted/azure.yaml` is the deploy manifest for the same agent.
# The agent definition lives INLINE on the service entry (unified shape, azd
# azure.ai.agents >=1.0.0-beta — no standalone agent.yaml). Keep
# `protocols[].version` equal to hosted/azure.yaml's (the hosted runtime fails
# fast on a mismatch) — see scripts/verify.sh.
requiredVersions:
    extensions:
        azure.ai.agents: '>=1.0.0-beta.5'
name: conversational-banking
services:
    conversational-banking:
        project: .
        host: azure.ai.agent
        language: docker
        docker:
            path: hosted/responses/Dockerfile
            context: .
            remoteBuild: true
        # ── inline agent definition (formerly ./agent.yaml) ──
        kind: hosted
        name: conversational-banking
        protocols:
            - protocol: responses
              version: 2.0.0
        codeConfiguration:
            runtime: python_3_13
            entryPoint: app.py
            dependencyResolution: remote_build
        environmentVariables:
            # literal default = the deployment `make up` provisions (see
            # hosted/azure.yaml `deployments`). For local runs the azd env wins
            # over this default: `azd env set AZURE_AI_MODEL_DEPLOYMENT_NAME <x>`
            # to point at a different deployment. A bare ${} placeholder here
            # resolves to EMPTY when the env doesn't define it → "Model is
            # required" crash. FOUNDRY_PROJECT_ENDPOINT is intentionally NOT
            # declared — `azd ai agent run` injects it (declaring it shadows).
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: gpt-4.1
        # ── run settings (formerly under config:) ──
        container:
            resources:
                cpu: "1"
                memory: 1Gi
        startupCommand: python app.py
