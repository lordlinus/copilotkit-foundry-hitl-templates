# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
#
# Deploy the agent as a Foundry HOSTED agent (Responses protocol) with `azd up`.
# Requires the azure.ai.agents azd extension (pinned below). Run from hosted/.
requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: conversational-banking
services:
    conversational-banking:
        # Build context is the TEMPLATE ROOT (one level up) so the shared src/
        # agent is included alongside hosted/responses/.
        project: ..
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
            path: hosted/responses/Dockerfile
            context: ..
        config:
            container:
                resources:
                    cpu: "1"
                    memory: 1Gi
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-4.1
                    version: "2025-04-14"
                  name: gpt-4.1
                  sku:
                    capacity: 100
                    name: GlobalStandard
            startupCommand: python main.py
