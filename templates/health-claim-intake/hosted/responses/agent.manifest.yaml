name: health-claim-intake
description: >
  A health insurance claim intake agent with native human-in-the-loop approval:
  it lists intake documents and auto-fills a claim form (read tools that run
  freely), lets the user edit draft fields, and submits the claim only after the
  user approves — submit_claim is decorated approval_mode="always_require" so its
  body pauses for explicit human Approve/Reject. Swap the demo extraction for a
  real OCR / document-intelligence pipeline.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Responses Protocol
    - Human-in-the-loop
    - Insurance
    - Document Intake
template:
  name: health-claim-intake
  kind: hosted
  protocols:
    - protocol: responses
      version: 2.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-4.1
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
