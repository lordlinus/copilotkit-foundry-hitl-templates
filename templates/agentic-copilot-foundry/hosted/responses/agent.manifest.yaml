name: agentic-copilot-foundry
# Gallery/publish manifest for the deployed hosted agent (read by
# agent_framework_foundry_hosting at runtime — see references/architecture.md's
# "Protocol v2.0" note). `template.protocols[].version` MUST equal agent.yaml's
# (this directory) and the template root's agent.yaml, or the hosted runtime
# fails fast with a protocol-mismatch RuntimeError — see scripts/verify.sh.
description: >
  A domain-agnostic Microsoft Agent Framework starter agent with native
  human-in-the-loop approval: read tools run freely, while any tool decorated
  approval_mode="always_require" pauses for explicit human Approve/Reject before
  its body executes. Replace the demo tools with your domain logic.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Responses Protocol
    - Human-in-the-loop
template:
  name: agentic-copilot-foundry
  kind: hosted
  protocols:
    - protocol: responses
      version: 2.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-4.1
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
