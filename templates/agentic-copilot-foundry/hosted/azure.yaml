# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
#
# Deploy the agent as a Foundry HOSTED agent (Responses protocol) with `azd up`.
# Requires the azure.ai.agents azd extension (pinned below). Run from hosted/.
requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: agentic-copilot-foundry
services:
    agentic-copilot-foundry:
        # project MUST NOT be ".." — azd (>=1.27) rejects any service path that
        # traverses outside the project directory ("relative path must not contain
        # '..'"). Keep project at "." (this dir) and point the Docker build context
        # at the template root separately via docker.context so the image can still
        # include the shared src/agent.py; tell the CLI where agent.yaml actually
        # lives via config.agentDefinitionPath (mirrors the AGENT_DEFINITION_PATH
        # env var) since it's no longer directly under project.
        project: .
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
            path: hosted/responses/Dockerfile
            context: ..
        config:
            agentDefinitionPath: responses/agent.yaml
            container:
                resources:
                    cpu: "1"
                    memory: 1Gi
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-4.1
                    version: "2025-04-14"
                  name: gpt-4.1
                  sku:
                    capacity: 100
                    name: GlobalStandard
            startupCommand: python main.py
