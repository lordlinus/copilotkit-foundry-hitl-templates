# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
#
# DEPLOY azd project for the hosted agent, run via `cd hosted && azd up` (`make
# up`). Separate from the template-root azure.yaml (LOCAL-DEV only, `azd ai agent
# run`) and from ../deploy/azure.yaml (bridge + frontend Container Apps).
# The agent definition lives INLINE on the service entry (unified shape, azd
# azure.ai.agents >=1.0.0-beta — no standalone agent.yaml). Keep
# `protocols[].version` equal to the root azure.yaml's (the hosted runtime fails
# fast on a mismatch) — see ../scripts/verify.sh.
requiredVersions:
    extensions:
        azure.ai.agents: '>=1.0.0-beta.5'
name: agentic-copilot-foundry
services:
    agentic-copilot-foundry:
        project: .
        host: azure.ai.agent
        language: docker
        docker:
            path: responses/Dockerfile
            context: ..
            remoteBuild: true
        # ── inline agent definition (formerly ./agent.yaml) ──
        kind: hosted
        name: agentic-copilot-foundry
        protocols:
            - protocol: responses
              version: 2.0.0
        environmentVariables:
            # keep equal to deployments[].name below — src/agent.py requires it
            # (an azd-env ${} placeholder here resolves to EMPTY unless the azd
            # env defines it, and the container then crashes at startup)
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: gpt-4.1
        # ── deploy settings (formerly under config:) ──
        container:
            resources:
                cpu: "1"
                memory: 2Gi
        deployments:
            - model:
                format: OpenAI
                name: gpt-4.1
                version: "2025-04-14"
              name: gpt-4.1
              sku:
                capacity: 100
                name: GlobalStandard
        startupCommand: python main.py
infra:
    provider: microsoft.foundry
